<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LoRa Cam</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #09090b;
  --s1:       #111114;
  --s2:       #18181c;
  --s3:       #222228;
  --border:   #2a2a32;
  --border2:  #3a3a46;
  --text:     #e4e4f0;
  --muted:    #52525e;
  --muted2:   #6b6b7a;
  --cyan:     #06b6d4;
  --cyan-dim: #0e4f5c;
  --green:    #22c55e;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --purple:   #a855f7;
  --mono:     'IBM Plex Mono', monospace;
  --sans:     'IBM Plex Sans', sans-serif;
  --r:        6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--sans);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 48px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--cyan);
  display: flex;
  align-items: center;
  gap: 8px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: breathe 3s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

.topbar-sep { width: 1px; height: 20px; background: var(--border); }

.pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--muted2);
  transition: all .25s;
}
.pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pill.ok  { border-color: var(--green); color: var(--green); }
.pill.rx  { border-color: var(--cyan);  color: var(--cyan); }
.pill.rx .pill-dot { animation: blink .7s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.pill.err { border-color: var(--red); color: var(--red); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* ── LAYOUT ── */
.workspace {
  display: grid;
  grid-template-columns: 300px 1fr 280px;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

.panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.panel:last-child { border-right: none; }

.panel-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 14px;
}

/* ── FIELDS ── */
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }

label {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}

select, input[type="number"], input[type="range"] {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 10px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
select:focus, input[type="number"]:focus { border-color: var(--cyan); }
select option { background: var(--s2); }

input[type="range"] {
  padding: 0;
  height: 4px;
  cursor: pointer;
  accent-color: var(--cyan);
}

.range-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.range-row input[type="range"] { flex: 1; }

.range-val {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--cyan);
  min-width: 28px;
  text-align: right;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--r);
  border: 1px solid transparent;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  white-space: nowrap;
}

.btn-cyan {
  background: var(--cyan);
  color: #000;
  border-color: var(--cyan);
}
.btn-cyan:hover:not(:disabled) {
  background: #22d3ee;
  box-shadow: 0 0 20px rgba(6,182,212,0.35);
  transform: translateY(-1px);
}

.btn-outline {
  background: transparent;
  color: var(--text);
  border-color: var(--border2);
}
.btn-outline:hover:not(:disabled) {
  border-color: var(--cyan);
  color: var(--cyan);
}

.btn-ghost {
  background: transparent;
  color: var(--muted2);
  border-color: transparent;
  font-size: 10px;
  padding: 4px 8px;
}
.btn-ghost:hover:not(:disabled) { color: var(--text); }

.btn-red {
  background: transparent;
  color: var(--red);
  border-color: var(--red);
}
.btn-red:hover:not(:disabled) { background: rgba(239,68,68,0.1); }

.btn-green {
  background: var(--green);
  color: #000;
  border-color: var(--green);
}
.btn-green:hover:not(:disabled) {
  background: #4ade80;
  box-shadow: 0 0 20px rgba(34,197,94,0.3);
  transform: translateY(-1px);
}

.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

/* ── SECTION DIVIDER ── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
}

/* ── STAT CARDS ── */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 14px;
}

.stat {
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 8px 10px;
}

.stat-lbl {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 3px;
}

.stat-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  line-height: 1;
  color: var(--text);
}
.stat-val.c  { color: var(--cyan); }
.stat-val.g  { color: var(--green); }
.stat-val.a  { color: var(--amber); }
.stat-val.r  { color: var(--red); }
.stat-val.p  { color: var(--purple); }

.stat-unit {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── PROGRESS ── */
.prog-wrap { margin-bottom: 14px; }

.prog-labels {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 5px;
}

.prog-track {
  height: 4px;
  background: var(--s3);
  border-radius: 2px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
  transition: width .3s ease;
}

/* ── REPAIR STATUS ── */
.repair-box {
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: var(--r);
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--amber);
  margin-bottom: 10px;
  display: none;
}
.repair-box.visible { display: block; }

/* ── IMAGE PANEL ── */
.img-panel {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.img-canvas {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at center, #13131a 0%, var(--bg) 70%);
}

#preview {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: none;
  border-radius: 4px;
}

.img-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  color: var(--muted);
  pointer-events: none;
}

.img-empty-icon {
  width: 72px; height: 72px;
  border: 1.5px dashed var(--border2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.img-empty-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

/* scan line */
.scanline {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--cyan) 50%, transparent 100%);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
  animation: scan 1.8s linear infinite;
}
.scanline.active { opacity: 0.6; }
@keyframes scan {
  0%   { top: 0%; }
  100% { top: 100%; }
}

/* corner marks */
.corners {
  position: absolute;
  inset: 24px;
  pointer-events: none;
  opacity: 0;
  transition: opacity .4s;
}
.corners.active { opacity: 1; }
.corner {
  position: absolute;
  width: 16px; height: 16px;
  border-color: var(--cyan);
  border-style: solid;
  opacity: 0.5;
}
.corner-tl { top:0; left:0;  border-width: 2px 0 0 2px; }
.corner-tr { top:0; right:0; border-width: 2px 2px 0 0; }
.corner-bl { bottom:0; left:0;  border-width: 0 0 2px 2px; }
.corner-br { bottom:0; right:0; border-width: 0 2px 2px 0; }

.img-footer {
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  background: var(--s1);
  display: flex;
  gap: 16px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}
.img-footer span { color: var(--text); }

/* ── RAW LOG ── */
#log {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.7;
  background: var(--bg);
  word-break: break-all;
}

.ll-sys  { color: var(--amber); }
.ll-pkt  { color: var(--muted2); }
.ll-ack  { color: var(--green); }
.ll-err  { color: var(--red); }
.ll-end  { color: var(--cyan); }
.ll-rep  { color: var(--purple); }
.ll-meta { color: var(--muted); font-style: italic; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── BADGE ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.badge-ok     { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.badge-partial { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    LORA·CAM
  </div>
  <div class="topbar-sep"></div>
  <div class="pill" id="connPill"><div class="pill-dot"></div><span id="connLabel">OFFLINE</span></div>
  <div class="pill" id="rxPill"  style="display:none"><div class="pill-dot"></div><span id="rxLabel">IDLE</span></div>
  <div class="topbar-right">
    <button class="btn btn-cyan"    id="connectBtn"  onclick="connectPort()">Connect</button>
    <button class="btn btn-red"     id="disconnBtn"  onclick="disconnectPort()" disabled>Disconnect</button>
  </div>
</div>

<div class="workspace">

  <!-- LEFT: CONTROLS -->
  <div class="panel">
    <div class="panel-head">Camera Controls</div>
    <div class="panel-body">

      <!-- Connection -->
      <div class="field">
        <label>Baud Rate</label>
        <select id="baudSel">
          <option value="9600" selected>9600</option>
          <option value="19200">19200</option>
          <option value="38400">38400</option>
          <option value="57600">57600</option>
          <option value="115200">115200</option>
        </select>
      </div>

      <div class="divider"></div>

      <!-- Resolution -->
      <div class="field">
        <label>Resolution</label>
        <select id="resSel" onchange="settingsChanged()">
          <option value="0">QQVGA — 160×120  (fastest)</option>
          <option value="1" selected>QVGA  — 320×240  (recommended)</option>
          <option value="2">VGA   — 640×480</option>
          <option value="3">SVGA  — 800×600</option>
          <option value="4">UXGA  — 1600×1200 (very slow)</option>
        </select>
      </div>

      <!-- JPEG Quality -->
      <div class="field">
        <label>JPEG Quality <span style="color:var(--muted2);font-weight:400">(lower = better)</span></label>
        <div class="range-row">
          <input type="range" id="qualRange" min="4" max="40" value="8"
                 oninput="document.getElementById('qualVal').textContent=this.value; settingsChanged()">
          <div class="range-val" id="qualVal">8</div>
        </div>
      </div>

      <!-- Packet Size -->
      <div class="field">
        <label>Packet Size (chars)</label>
        <div class="range-row">
          <input type="range" id="pktRange" min="16" max="128" value="64" step="8"
                 oninput="document.getElementById('pktVal').textContent=this.value; settingsChanged()">
          <div class="range-val" id="pktVal">64</div>
        </div>
      </div>

      <!-- Timeout -->
      <div class="field">
        <label>Repair Timeout (ms)</label>
        <input type="number" id="timeoutInput" value="5000" min="1000" max="30000" step="500">
      </div>

      <div class="divider"></div>

      <div id="syncWarning" style="display:none;font-family:var(--mono);font-size:10px;color:var(--amber);margin-bottom:10px">
        ⚠ Settings not yet applied
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" id="applyBtn" onclick="applySettings()" disabled>Apply Settings</button>
        <button class="btn btn-outline"               onclick="requestStatus()"  disabled id="statusBtn">Sync</button>
      </div>

      <div class="divider"></div>

      <div class="btn-row">
        <button class="btn btn-green" id="captureBtn" onclick="startCapture()" disabled style="flex:1">
          ▶&nbsp;Capture
        </button>
        <button class="btn btn-outline" id="dlBtn" onclick="downloadImage()" disabled>↓</button>
      </div>

    </div>
  </div>

  <!-- MIDDLE: IMAGE -->
  <div class="img-panel">
    <div class="img-canvas" id="imgCanvas">
      <div class="img-empty" id="imgEmpty">
        <div class="img-empty-icon">🛰</div>
        <div class="img-empty-label">No image received</div>
      </div>
      <div class="scanline" id="scanline"></div>
      <div class="corners" id="corners">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
      </div>
      <img id="preview" alt="">
    </div>
    <div class="img-footer">
      Size:&nbsp;<span id="fSize">—</span>
      &nbsp;|&nbsp; Res:&nbsp;<span id="fRes">—</span>
      &nbsp;|&nbsp; Pkts:&nbsp;<span id="fPkts">—</span>
      &nbsp;|&nbsp; Time:&nbsp;<span id="fTime">—</span>
      &nbsp;|&nbsp; <span id="fBadge"></span>
    </div>
  </div>

  <!-- RIGHT: STATS + LOG -->
  <div class="panel" style="border-right:none; border-left:1px solid var(--border)">
    <div class="panel-head">
      Stats &amp; Log
      <button class="btn btn-ghost" onclick="clearLog()">Clear</button>
    </div>
    <div class="panel-body" style="padding-bottom:0; display:flex; flex-direction:column; gap:0; flex:1; overflow:hidden">

      <div class="stat-grid">
        <div class="stat"><div class="stat-lbl">Packets</div><div class="stat-val c" id="sPkts">0</div><div class="stat-unit">rx'd</div></div>
        <div class="stat"><div class="stat-lbl">Total</div>  <div class="stat-val"  id="sTotal">—</div><div class="stat-unit">expected</div></div>
        <div class="stat"><div class="stat-lbl">Retries</div><div class="stat-val a" id="sRetry">0</div><div class="stat-unit">repairs</div></div>
        <div class="stat"><div class="stat-lbl">Errors</div> <div class="stat-val r" id="sErr">0</div>  <div class="stat-unit">bad chk</div></div>
        <div class="stat"><div class="stat-lbl">Speed</div>  <div class="stat-val g" id="sSpd">—</div>  <div class="stat-unit">pkts/s</div></div>
        <div class="stat"><div class="stat-lbl">Elapsed</div><div class="stat-val p" id="sTime">—</div> <div class="stat-unit">seconds</div></div>
      </div>

      <div class="prog-wrap">
        <div class="prog-labels">
          <span>Transfer</span>
          <span id="progLabel">—</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      </div>

      <div class="repair-box" id="repairBox"></div>

      <div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Raw Log</div>
      <div id="log" style="flex:1;min-height:0"></div>

    </div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let port, reader, writer;
let serialBuf = "";

// Transfer state
let phase       = "idle";   // idle | blasting | repairing
let totalPkts   = 0;
let received    = {};       // idx -> data string
let receivedCount = 0;
let captureStart  = null;
let repairTimer   = null;
let repairTimeout = 5000;

// Stats
let statErrors = 0;
let statRepairs = 0;
let settingsDirty = false;

/* ═══════════════════════════════════════════
   ELEMENTS
═══════════════════════════════════════════ */
const connPill    = document.getElementById("connPill");
const connLabel   = document.getElementById("connLabel");
const rxPill      = document.getElementById("rxPill");
const rxLabel     = document.getElementById("rxLabel");
const connectBtn  = document.getElementById("connectBtn");
const disconnBtn  = document.getElementById("disconnBtn");
const captureBtn  = document.getElementById("captureBtn");
const applyBtn    = document.getElementById("applyBtn");
const statusBtn   = document.getElementById("statusBtn");
const dlBtn       = document.getElementById("dlBtn");
const preview     = document.getElementById("preview");
const imgEmpty    = document.getElementById("imgEmpty");
const scanline    = document.getElementById("scanline");
const corners     = document.getElementById("corners");
const repairBox   = document.getElementById("repairBox");
const progFill    = document.getElementById("progFill");
const progLabel   = document.getElementById("progLabel");
const logEl       = document.getElementById("log");

/* ═══════════════════════════════════════════
   SETTINGS DIRTY FLAG
═══════════════════════════════════════════ */
function settingsChanged() {
  settingsDirty = true;
  document.getElementById("syncWarning").style.display = "block";
  applyBtn.disabled = !writer;
}

/* ═══════════════════════════════════════════
   STATUS / PILL
═══════════════════════════════════════════ */
function setConn(mode, label) {
  connPill.className = "pill " + (mode || "");
  connLabel.textContent = label;
}

function setRx(mode, label) {
  if (!label) { rxPill.style.display = "none"; return; }
  rxPill.style.display = "inline-flex";
  rxPill.className = "pill " + (mode || "");
  rxLabel.textContent = label;
}

/* ═══════════════════════════════════════════
   LOG
═══════════════════════════════════════════ */
function log(text, cls) {
  const d = document.createElement("div");
  d.className = cls || "";
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.childNodes.length > 600) logEl.removeChild(logEl.firstChild);
}
function clearLog() { logEl.innerHTML = ""; }

/* ═══════════════════════════════════════════
   CHECKSUM
═══════════════════════════════════════════ */
function checksum(str) {
  let s = 0;
  for (let i = 0; i < str.length; i++) s += str.charCodeAt(i);
  return s & 0xFF;
}

/* ═══════════════════════════════════════════
   STATS UPDATE
═══════════════════════════════════════════ */
function updateStats() {
  document.getElementById("sPkts").textContent  = receivedCount;
  document.getElementById("sTotal").textContent = totalPkts || "—";
  document.getElementById("sRetry").textContent = statRepairs;
  document.getElementById("sErr").textContent   = statErrors;

  if (captureStart && receivedCount > 0) {
    const el = (Date.now() - captureStart) / 1000;
    document.getElementById("sTime").textContent = el.toFixed(1);
    document.getElementById("sSpd").textContent  = (receivedCount / el).toFixed(1);
  }

  if (totalPkts > 0) {
    const pct = Math.round((receivedCount / totalPkts) * 100);
    progFill.style.width   = pct + "%";
    progLabel.textContent  = receivedCount + " / " + totalPkts + " (" + pct + "%)";
    document.getElementById("fPkts").textContent = receivedCount + "/" + totalPkts;
  }
}

/* ═══════════════════════════════════════════
   IMAGE RENDER
═══════════════════════════════════════════ */
function assembleAndRender(final) {
  // Build ordered base64 string from received map
  let b64 = "";
  for (let i = 0; i < totalPkts; i++) {
    if (received[i] !== undefined) b64 += received[i];
  }
  if (b64.length < 50) return;

  preview.src = "data:image/jpeg;base64," + b64;
  preview.style.display = "block";
  imgEmpty.style.display = "none";

  if (final) {
    scanline.classList.remove("active");
    corners.classList.remove("active");
    document.getElementById("fBadge").innerHTML = '<span class="badge badge-ok">COMPLETE</span>';
    document.getElementById("fTime").textContent = new Date().toLocaleTimeString();
    preview.onload = () => {
      document.getElementById("fRes").textContent  = preview.naturalWidth + "×" + preview.naturalHeight;
      document.getElementById("fSize").textContent = (b64.length * 0.75 / 1024).toFixed(1) + " KB";
    };
    dlBtn.disabled = false;
    window._lastB64 = b64;
  } else {
    document.getElementById("fBadge").innerHTML = '<span class="badge badge-partial">PARTIAL</span>';
  }
}

/* ═══════════════════════════════════════════
   REPAIR LOGIC
═══════════════════════════════════════════ */
function getMissing() {
  const missing = [];
  for (let i = 0; i < totalPkts; i++) {
    if (received[i] === undefined) missing.push(i);
  }
  return missing;
}

async function requestRepair() {
  const missing = getMissing();
  if (missing.length === 0) {
    finishTransfer();
    return;
  }
  statRepairs++;
  const msg = "REPAIR," + missing.join(",");
  repairBox.textContent = "⟳ Requesting " + missing.length + " missing packet(s): " + missing.slice(0, 10).join(", ") + (missing.length > 10 ? "…" : "");
  repairBox.classList.add("visible");
  log("> " + msg, "ll-rep");
  await writeLine(msg);

  // Set timeout to retry repair if no END received
  clearTimeout(repairTimer);
  repairTimer = setTimeout(() => {
    if (phase === "repairing") {
      log("// Repair timeout — retrying", "ll-meta");
      requestRepair();
    }
  }, repairTimeout);
}

function finishTransfer() {
  phase = "idle";
  clearTimeout(repairTimer);
  repairBox.classList.remove("visible");
  const el = ((Date.now() - captureStart) / 1000).toFixed(1);
  document.getElementById("sTime").textContent = el;
  setRx("ok", "DONE");
  log("// Transfer complete in " + el + "s", "ll-meta");
  assembleAndRender(true);
  updateStats();
}

/* ═══════════════════════════════════════════
   SERIAL CONNECT
═══════════════════════════════════════════ */
async function connectPort() {
  try {
    const baud = parseInt(document.getElementById("baudSel").value, 10);
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: baud });

    const enc = new TextEncoderStream();
    enc.readable.pipeTo(port.writable);
    writer = enc.writable.getWriter();

    const dec = new TextDecoderStream();
    port.readable.pipeTo(dec.writable);
    reader = dec.readable.getReader();

    connectBtn.disabled = true;
    disconnBtn.disabled = false;
    captureBtn.disabled = false;
    statusBtn.disabled  = false;
    applyBtn.disabled   = !settingsDirty;

    setConn("ok", "CONNECTED");
    setRx(null, null);
    log("// Connected @ " + baud + " baud", "ll-meta");
    readLoop();
    requestStatus();
  } catch(e) {
    log("// Connect failed: " + e.message, "ll-err");
  }
}

async function disconnectPort() {
  try {
    if (reader) { await reader.cancel(); reader = null; }
    if (writer) { await writer.close();  writer = null; }
    if (port)   { await port.close();    port = null; }
  } catch(e) {}
  connectBtn.disabled = false;
  disconnBtn.disabled = true;
  captureBtn.disabled = true;
  statusBtn.disabled  = true;
  applyBtn.disabled   = true;
  setConn("", "OFFLINE");
  setRx(null, null);
  log("// Disconnected", "ll-meta");
}

async function writeLine(line) {
  if (!writer) return;
  await writer.write(line + "\n");
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
async function applySettings() {
  const fs  = document.getElementById("resSel").value;
  const q   = document.getElementById("qualRange").value;
  const ps  = document.getElementById("pktRange").value;
  const cmd = "CONFIG," + fs + "," + q + "," + ps;
  log("> " + cmd, "ll-sys");
  await writeLine(cmd);
  settingsDirty = false;
  document.getElementById("syncWarning").style.display = "none";
  applyBtn.disabled = true;
}

async function requestStatus() {
  if (!writer) return;
  log("> STATUS", "ll-sys");
  await writeLine("STATUS");
}

async function startCapture() {
  if (!writer) return;

  // Auto-apply settings if dirty
  if (settingsDirty) await applySettings();

  // Reset state
  phase         = "blasting";
  totalPkts     = 0;
  received      = {};
  receivedCount = 0;
  statErrors    = 0;
  statRepairs   = 0;
  captureStart  = Date.now();
  repairTimeout = parseInt(document.getElementById("timeoutInput").value, 10) || 5000;

  progFill.style.width = "0%";
  progLabel.textContent = "—";
  document.getElementById("fSize").textContent = "—";
  document.getElementById("fRes").textContent  = "—";
  document.getElementById("fPkts").textContent = "—";
  document.getElementById("fTime").textContent = "—";
  document.getElementById("fBadge").innerHTML  = "";
  repairBox.classList.remove("visible");
  dlBtn.disabled = true;
  preview.style.display = "none";
  imgEmpty.style.display = "flex";
  scanline.classList.add("active");
  corners.classList.add("active");

  setRx("rx", "CAPTURING");
  log("> CAPTURE", "ll-sys");
  await writeLine("CAPTURE");
  updateStats();
}

function downloadImage() {
  if (!window._lastB64) return;
  const a = document.createElement("a");
  a.href = "data:image/jpeg;base64," + window._lastB64;
  a.download = "lora_" + Date.now() + ".jpg";
  a.click();
}

/* ═══════════════════════════════════════════
   READ LOOP
═══════════════════════════════════════════ */
async function readLoop() {
  while (true) {
    try {
      const { value, done } = await reader.read();
      if (done) break;
      if (!value) continue;
      serialBuf += value;
      const lines = serialBuf.split("\n");
      serialBuf = lines.pop();
      for (const raw of lines) {
        const line = raw.replace(/\r/g, "").trim();
        if (line) await processLine(line);
      }
    } catch(e) {
      log("// Read error: " + e.message, "ll-err");
      break;
    }
  }
}

async function processLine(line) {
  // Classify for log colouring
  let cls = "ll-pkt";
  if (["BOOT","CAM_OK","READY","SETTINGS_OK","STATUS"].some(k => line.startsWith(k))) cls = "ll-sys";
  else if (line.startsWith("ERR"))   cls = "ll-err";
  else if (line === "END")           cls = "ll-end";
  else if (line.startsWith("START")) cls = "ll-sys";

  // Only log PKT lines at low verbosity to keep log clean
  if (line.startsWith("PKT,")) {
    // log every 10th packet to avoid flooding
    const idx = parseInt(line.split(",")[1], 10);
    if (idx % 10 === 0) log(line, "ll-pkt");
  } else {
    log(line, cls);
  }

  /* ── BOOT / READY ── */
  if (line === "BOOT")       { setConn("ok", "BOOT");  return; }
  if (line === "CAM_OK")     { setConn("ok", "CAM OK"); return; }
  if (line === "READY")      { setConn("ok", "READY"); return; }
  if (line === "SETTINGS_OK"){ setRx("ok", "CFG OK");  return; }

  /* ── STATUS sync ── */
  if (line.startsWith("STATUS,")) {
    const p = line.split(",");
    if (p.length >= 4) {
      document.getElementById("resSel").value    = p[1];
      document.getElementById("qualRange").value = p[2];
      document.getElementById("qualVal").textContent = p[2];
      document.getElementById("pktRange").value  = p[3];
      document.getElementById("pktVal").textContent  = p[3];
      settingsDirty = false;
      document.getElementById("syncWarning").style.display = "none";
      applyBtn.disabled = true;
      log("// UI synced with device config", "ll-meta");
    }
    return;
  }

  /* ── ERROR ── */
  if (line.startsWith("ERR")) {
    phase = "idle";
    scanline.classList.remove("active");
    corners.classList.remove("active");
    setRx("err", "ERROR");
    return;
  }

  /* ── START ── */
  if (line.startsWith("START,")) {
    const p = line.split(",");
    totalPkts = parseInt(p[1], 10);
    phase = "blasting";
    setRx("rx", "RECEIVING");
    updateStats();
    return;
  }

  /* ── PACKET ── */
  if (line.startsWith("PKT,")) {
    if (phase !== "blasting" && phase !== "repairing") return;
    const parts = line.split(",");
    const idx   = parseInt(parts[1], 10);
    const chk   = parseInt(parts[2], 10);
    const data  = parts.slice(3).join(",");

    const localChk = checksum(data);
    if (localChk !== chk) {
      statErrors++;
      log("// Checksum fail pkt " + idx, "ll-err");
      updateStats();
      return; // will be requested in REPAIR
    }

    if (received[idx] === undefined) {
      received[idx] = data;
      receivedCount++;
    }

    updateStats();

    // Progressive render every 20 packets
    if (receivedCount % 20 === 0) assembleAndRender(false);
    return;
  }

  /* ── END ── */
  if (line === "END") {
    clearTimeout(repairTimer);
    const missing = getMissing();
    if (missing.length === 0) {
      finishTransfer();
    } else {
      phase = "repairing";
      setRx("rx", "REPAIRING");
      log("// " + missing.length + " packets missing — requesting repair", "ll-meta");
      requestRepair();
    }
    return;
  }
}
</script>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESP32 Serial Camera Receiver</title>

<style>
body{
  font-family:Helvetica,Arial,sans-serif;
  background:#f5f7fb;
  padding:20px;
  margin:0;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  max-width:1100px;
  margin:auto;
}

h2,h3{
  margin-top:0;
}

button{
  font-size:20px;
  padding:10px 20px;
  margin:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

textarea{
  width:100%;
  height:180px;
  font-size:12px;
  margin-top:10px;
  box-sizing:border-box;
  font-family:Consolas,monospace;
  resize:vertical;
}

img{
  width:100%;
  margin-top:20px;
  border-radius:12px;
  background:#ddd;
  min-height:260px;
  object-fit:contain;
}

.status{
  margin-top:10px;
  font-size:16px;
  white-space:pre-wrap;
}

.row{
  margin-bottom:18px;
}

.small{
  color:#475569;
  font-size:14px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="card">

  <h2>ESP32 Serial Camera Receiver</h2>

  <div class="row">
    <button id="connectBtn" onclick="connectPort()">Connect</button>
    <button id="captureBtn" onclick="startCapture()" disabled>Capture</button>
    <button id="downloadBtn" onclick="downloadImage()" disabled>Download</button>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="status" id="status">Not connected</div>
  <div class="small" id="meta"></div>

  <h3>Raw Stream</h3>
  <textarea id="rawBox"></textarea>

  <h3>Packet / Image Info</h3>
  <textarea id="processedBox"></textarea>

  <h3>Image</h3>
  <img id="img">

</div>

<script>
let port;
let reader;
let writer;

let rxBuffer = new Uint8Array(0);

let receivingBinary = false;
let expectedIndex = 0;
let totalPackets = 0;
let expectedImageBytes = 0;
let receivedBytes = 0;
let imageBytes = null;
let imageUrl = "";

const PKT_SIZE = 64;

const rawBox = document.getElementById("rawBox");
const processedBox = document.getElementById("processedBox");
const img = document.getElementById("img");
const statusBox = document.getElementById("status");
const metaBox = document.getElementById("meta");
const captureBtn = document.getElementById("captureBtn");
const downloadBtn = document.getElementById("downloadBtn");

function setStatus(text){
  statusBox.textContent = text;
}

function setMeta(text){
  metaBox.textContent = text;
}

function logRaw(line){
  rawBox.value += line + "\n";
  rawBox.scrollTop = rawBox.scrollHeight;
}

function logProcessed(line){
  processedBox.value += line + "\n";
  processedBox.scrollTop = processedBox.scrollHeight;
}

function clearImageUrl(){
  if(imageUrl){
    URL.revokeObjectURL(imageUrl);
    imageUrl = "";
  }
}

function appendBytes(a, b){
  const out = new Uint8Array(a.length + b.length);
  out.set(a, 0);
  out.set(b, a.length);
  return out;
}

function bytesToAscii(bytes){
  return new TextDecoder().decode(bytes);
}

function asciiToBytes(text){
  return new TextEncoder().encode(text);
}

function packetChecksum(idx, len, data){
  let sum = 0;
  sum += (idx >> 8) & 0xFF;
  sum += idx & 0xFF;
  sum += len & 0xFF;

  for(let i = 0; i < len; i++){
    sum += data[i];
  }

  return sum & 0xFF;
}

async function connectPort(){
  port = await navigator.serial.requestPort();
  await port.open({ baudRate:115200 });

  writer = port.writable.getWriter();
  reader = port.readable.getReader();

  captureBtn.disabled = false;
  setStatus("Connected");
  setMeta("");
  readLoop();
}

async function writeLine(line){
  if(!writer) return;
  const bytes = asciiToBytes(line + "\n");
  await writer.write(bytes);
}

function resetCaptureState(){
  receivingBinary = false;
  expectedIndex = 0;
  totalPackets = 0;
  expectedImageBytes = 0;
  receivedBytes = 0;
  imageBytes = null;
  clearImageUrl();
  img.src = "";
  downloadBtn.disabled = true;
  setMeta("");
}

async function startCapture(){
  if(!writer) return;

  rawBox.value = "";
  processedBox.value = "";
  resetCaptureState();

  setStatus("Capture requested");
  logProcessed("Waiting for START...");
  await writeLine("CAPTURE");
}

async function readLoop(){
  while(true){
    const { value, done } = await reader.read();
    if(done) break;
    if(!value) continue;

    rxBuffer = appendBytes(rxBuffer, value);
    await parseBuffer();
  }
}

async function parseBuffer(){
  while(rxBuffer.length > 0){

    if(receivingBinary && expectedIndex < totalPackets){

      if(rxBuffer.length < 5){
        return;
      }

      if(!(rxBuffer[0] === 0xAA && rxBuffer[1] === 0x55)){
        let headerPos = -1;
        for(let i = 1; i < rxBuffer.length - 1; i++){
          if(rxBuffer[i] === 0xAA && rxBuffer[i + 1] === 0x55){
            headerPos = i;
            break;
          }
        }

        if(headerPos === -1){
          logRaw("Binary sync lost, dropping " + rxBuffer.length + " byte(s)");
          rxBuffer = new Uint8Array(0);
          return;
        } else {
          logRaw("Binary sync realigned, dropped " + headerPos + " byte(s)");
          rxBuffer = rxBuffer.slice(headerPos);
        }

        if(rxBuffer.length < 5){
          return;
        }
      }

      const idx = (rxBuffer[2] << 8) | rxBuffer[3];
      const len = rxBuffer[4];
      const packetLen = 5 + len + 1;

      if(rxBuffer.length < packetLen){
        return;
      }

      const payload = rxBuffer.slice(5, 5 + len);
      const chk = rxBuffer[5 + len];
      rxBuffer = rxBuffer.slice(packetLen);

      if(idx !== expectedIndex){
        setStatus("Packet out of order. Expected " + expectedIndex + " got " + idx);
        logProcessed("NACK packet " + expectedIndex + " (out of order, got " + idx + ")");
        await writeLine(`NACK,${expectedIndex}`);
        continue;
      }

      const localChk = packetChecksum(idx, len, payload);

      if(localChk !== chk){
        setStatus("Checksum fail on packet " + idx);
        logProcessed("NACK packet " + idx + " (checksum fail local=" + localChk + " remote=" + chk + ")");
        await writeLine(`NACK,${idx}`);
        continue;
      }

      const start = idx * PKT_SIZE;
      const end = start + len;

      if(imageBytes && end <= imageBytes.length){
        imageBytes.set(payload, start);
      }

      receivedBytes += len;
      expectedIndex++;

      logProcessed(
        "Packet " + idx +
        " OK | len=" + len +
        " | chk=" + chk +
        " | bytes=" + receivedBytes + "/" + expectedImageBytes
      );

      setStatus("Receiving packet " + expectedIndex + " of " + totalPackets);
      setMeta("Image bytes: " + receivedBytes + " / " + expectedImageBytes);

      await writeLine(`ACK,${idx},${chk}`);

      if(expectedIndex >= totalPackets){
        receivingBinary = false;
        rebuildImage();
      }

      continue;
    }

    const newlineIndex = rxBuffer.indexOf(10);

    if(newlineIndex === -1){
      return;
    }

    const lineBytes = rxBuffer.slice(0, newlineIndex);
    rxBuffer = rxBuffer.slice(newlineIndex + 1);

    const line = bytesToAscii(lineBytes).replace(/\r/g, "").trim();

    if(line){
      await processLine(line);
    }
  }
}

async function processLine(line){
  logRaw(line);

  if(line === "BOOT"){
    setStatus("Booting");
    return;
  }

  if(line === "CAM_OK"){
    setStatus("Camera ready");
    return;
  }

  if(line === "READY"){
    setStatus("Ready");
    return;
  }

  if(line === "END"){
    setStatus("Transfer complete");
    return;
  }

  if(line.startsWith("ERR")){
    setStatus(line);
    receivingBinary = false;
    return;
  }

  if(line.startsWith("START,")){
    const parts = line.split(",");

    totalPackets = parseInt(parts[1] || "0", 10);
    expectedImageBytes = parseInt(parts[2] || "0", 10);

    expectedIndex = 0;
    receivedBytes = 0;
    receivingBinary = true;
    imageBytes = new Uint8Array(expectedImageBytes);

    logProcessed("START received");
    logProcessed("Total packets: " + totalPackets);
    logProcessed("Expected image bytes: " + expectedImageBytes);

    setStatus("Receiving packet 0 of " + totalPackets);
    setMeta("Image bytes: 0 / " + expectedImageBytes);
    return;
  }
}

function rebuildImage(){
  if(!imageBytes || receivedBytes <= 0){
    return;
  }

  clearImageUrl();

  const blob = new Blob([imageBytes], { type:"image/jpeg" });
  imageUrl = URL.createObjectURL(blob);
  img.src = imageUrl;
  downloadBtn.disabled = false;

  logProcessed("Image rebuilt from binary JPEG bytes");
}

function downloadImage(){
  if(!imageBytes || !imageBytes.length) return;

  const blob = new Blob([imageBytes], { type:"image/jpeg" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "image.jpg";
  a.click();

  setTimeout(() => {
    URL.revokeObjectURL(url);
  }, 1000);
}

function clearAll(){
  rawBox.value = "";
  processedBox.value = "";
  resetCaptureState();
  setStatus(writer ? "Connected" : "Not connected");
}
</script>

</body>
</html>
